name: Node.js CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # Install backend dependencies
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      # Install frontend dependencies
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      # Build frontend
      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # Create .env
      - name: Create .env file safely
        working-directory: backend
        run: |
          rm -f .env
          printf "%s" "${{ secrets.PROD_ENV_FILE }}" > .env
          chmod 600 .env
          echo ".env file created"

      # Restart backend
      - name: Restart backend with PM2
        working-directory: backend
        run: |
          pm2 delete revoult-backend || true
          pm2 start server.js --name revoult-backend