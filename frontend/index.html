<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revolut Checkout</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      background-color: #ffffff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
    .logo {
      width: 120px; /* Adjust logo size */
      margin-bottom: 20px;
    }
    h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 24px;
    }
    #payBtn {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    #payBtn:hover {
      background-color: #218838;
    }
    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #888;
    }
  </style>
   
</head>
<body>
  <div class="container">
    <!-- Logo section -->
    <img src="logo11.png" alt="Revolut Logo" class="logo" />
    
    <h2>Pay with Revolut</h2>
    <button id="payBtn">Pay Now</button>
    <p class="footer">Secure payment gateway powered by Revolut</p>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
