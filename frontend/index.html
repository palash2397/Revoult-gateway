<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAPSi — Secure Payment</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --green-deep: #0d5c2f;
        --green-mid: #1a8c4e;
        --green-bright: #22c55e;
        --green-glow: #4ade80;
        --cream: #f7f9f5;
        --card-bg: #ffffff;
        --text-primary: #0f1a13;
        --text-secondary: #4b6358;
        --text-muted: #8fa898;
        --border: rgba(34, 197, 94, 0.15);
        --shadow-card:
          0 24px 64px rgba(13, 92, 47, 0.12), 0 4px 16px rgba(0, 0, 0, 0.06);
      }

      html,
      body {
        height: 100%;
        width: 100%;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--cream);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* Ambient background */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 80% 60% at 20% 10%,
            rgba(34, 197, 94, 0.12) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 50% at 80% 90%,
            rgba(13, 92, 47, 0.08) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse 40% 40% at 50% 50%,
            rgba(74, 222, 128, 0.05) 0%,
            transparent 70%
          );
        pointer-events: none;
        z-index: 0;
      }

      /* Floating road lines decoration */
      .bg-lines {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        opacity: 0.035;
      }
      .bg-lines svg {
        width: 100%;
        height: 100%;
      }

      /* Main card */
      .card {
        position: relative;
        z-index: 1;
        background: var(--card-bg);
        border-radius: 28px;
        padding: 48px 44px 44px;
        width: 100%;
        max-width: 420px;
        box-shadow: var(--shadow-card);
        border: 1px solid rgba(34, 197, 94, 0.1);
        animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        overflow: hidden;
      }

      /* Top accent bar */
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--green-deep),
          var(--green-bright),
          var(--green-glow)
        );
        border-radius: 28px 28px 0 0;
      }

      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(32px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* Header */
      .header {
        text-align: center;
        margin-bottom: 36px;
        animation: fadeUp 0.6s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .logo-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0faf4, #e6f7ec);
        border-radius: 20px;
        width: 80px;
        height: 80px;
        margin-bottom: 18px;
        box-shadow:
          0 4px 16px rgba(34, 197, 94, 0.15),
          inset 0 1px 1px rgba(255, 255, 255, 0.8);
      }

      .logo-wrap img {
        width: 52px;
        height: 52px;
        object-fit: contain;
      }

      .brand-name {
        font-family: "Sora", sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.18em;
        color: var(--green-mid);
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      /* Divider */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 0 0 28px;
        animation: fadeUp 0.6s 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .divider-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border));
      }
      .divider-line:last-child {
        background: linear-gradient(90deg, var(--border), transparent);
      }
      .divider-text {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        color: var(--text-muted);
        text-transform: uppercase;
      }

      /* Payment title */
      .pay-title {
        font-family: "Sora", sans-serif;
        font-size: 22px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 6px;
        text-align: center;
        animation: fadeUp 0.6s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .pay-subtitle {
        font-size: 14px;
        color: var(--text-muted);
        text-align: center;
        margin-bottom: 32px;
        font-weight: 400;
        line-height: 1.5;
        animation: fadeUp 0.6s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* Trust badges row */
      .trust-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 32px;
        animation: fadeUp 0.6s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .trust-badge {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        color: var(--text-muted);
      }
      .trust-icon {
        width: 36px;
        height: 36px;
        background: #f3faf6;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(34, 197, 94, 0.12);
      }
      .trust-icon svg {
        width: 16px;
        height: 16px;
        stroke: var(--green-mid);
      }
      .trust-label {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: var(--text-muted);
      }

      /* Pay button */
      .btn-pay {
        width: 100%;
        padding: 17px 24px;
        background: linear-gradient(
          135deg,
          var(--green-mid) 0%,
          var(--green-deep) 100%
        );
        color: #fff;
        border: none;
        border-radius: 14px;
        font-family: "Sora", sans-serif;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.03em;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        box-shadow:
          0 8px 24px rgba(13, 92, 47, 0.28),
          0 2px 6px rgba(0, 0, 0, 0.1);
        animation: fadeUp 0.6s 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn-pay::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15) 0%,
          transparent 60%
        );
        pointer-events: none;
      }

      .btn-pay:hover {
        transform: translateY(-2px);
        box-shadow:
          0 14px 32px rgba(13, 92, 47, 0.32),
          0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .btn-pay:active {
        transform: translateY(0px) scale(0.99);
        box-shadow: 0 4px 12px rgba(13, 92, 47, 0.2);
      }

      .btn-pay svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      /* Shimmer on button */
      .btn-pay::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.18),
          transparent
        );
        transform: skewX(-20deg);
        animation: shimmer 3.5s 1.2s infinite;
      }
      @keyframes shimmer {
        0% {
          left: -100%;
        }
        40%,
        100% {
          left: 160%;
        }
      }

      /* Footer */
      .footer-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        margin-top: 22px;
        animation: fadeUp 0.6s 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .footer-row svg {
        width: 13px;
        height: 13px;
        stroke: var(--green-mid);
        flex-shrink: 0;
      }
      .footer-text {
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 400;
      }
      .footer-text span {
        color: var(--green-mid);
        font-weight: 500;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Mobile */
      @media (max-width: 480px) {
        body {
          padding: 20px;
          align-items: center;
        }
        .card {
          padding: 36px 28px 32px;
          border-radius: 24px;
          max-width: 100%;
          margin: 0;
        }
      }
    </style>
  </head>

  <div
    id="test-banner"
    style="
      position: fixed;

      left: 0;
      right: 0;
      background: red;
      color: white;
      text-align: center;
      padding: 10px;
      z-index: 99999;
      font-size: 16px;
    "
  >
    NEW VERSION LOADED ✅
  </div>
  <body>

              />
            </svg>
          </div>
          <span class="trust-label">Seguro</span>
        </div>
        <div class="trust-badge">
          <div class="trust-icon">
            <svg
              fill="none"

          <div class="trust-icon">
            <svg

      <div
        id="google-pay-btn"
        style="display: none; width: 100%; margin-bottom: 12px"
      ></div>
      <div
        id="apple-pay-btn"
        style="display: none; width: 100%; margin-bottom: 12px"
      ></div>

      <button class="btn-pay" id="payBtn">
        <svg
          fill="none"
          viewBox="0 0 24 24"

          <path

          />

      <div class="footer-row">
        <svg
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          xmlns="http://www.w3.org/2000/svg"

    <script type="module" src="/main.js"></script>

</html>
